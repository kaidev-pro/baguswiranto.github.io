<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1584">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1584px;
  height: 396px;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #030014;
  position: relative;
}

/* Stars */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle 4s ease-in-out infinite;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 0.8; }
}

/* Nebula glows */
.nebula-1 {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(249,115,22,0.2) 0%, transparent 70%);
  filter: blur(60px);
  top: -100px;
  right: 200px;
}

.nebula-2 {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(236,72,153,0.15) 0%, transparent 70%);
  filter: blur(60px);
  bottom: -80px;
  left: 100px;
}

.nebula-3 {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(249,115,22,0.1) 0%, transparent 70%);
  filter: blur(40px);
  top: 50px;
  left: 50%;
}

/* Content container */
.content {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  padding: 0 100px;
  z-index: 10;
}

/* Left side — text */
.left {
  flex: 1;
}

.tagline {
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 12px;
}

.name {
  font-size: 42px;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 10px;
}

.name .first {
  color: rgba(255,255,255,0.9);
}

.name .gradient {
  background: linear-gradient(135deg, #f97316, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.role {
  font-size: 16px;
  color: rgba(255,255,255,0.5);
  line-height: 1.5;
}

/* Right side — projects */
.right {
  display: flex;
  gap: 20px;
  align-items: center;
}

.project-badge {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

.project-badge .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: pulse-dot 2s ease-in-out infinite;
}

.project-badge.orange .dot { background: #f97316; }
.project-badge.pink .dot { background: #ec4899; }

@keyframes pulse-dot {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}

.project-badge .info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.project-badge .label {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.project-badge .title {
  font-size: 15px;
  font-weight: 600;
}

.project-badge.orange .title { color: #f97316; }
.project-badge.pink .title { color: #ec4899; }

/* Decorative line */
.deco-line {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #f97316, #ec4899, transparent);
  opacity: 0.4;
}

/* Grid lines */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 80px 80px;
  opacity: 0.5;
}

/* Orbit rings */
.orbit {
  position: absolute;
  border: 1px solid rgba(255,255,255,0.03);
  border-radius: 50%;
}

.orbit-1 {
  width: 300px;
  height: 300px;
  top: -100px;
  right: 100px;
}

.orbit-2 {
  width: 200px;
  height: 200px;
  bottom: -60px;
  left: 30%;
}
</style>
</head>
<body>
  <!-- Background -->
  <div class="nebula-1"></div>
  <div class="nebula-2"></div>
  <div class="nebula-3"></div>
  <div class="grid-overlay"></div>
  <div class="orbit orbit-1"></div>
  <div class="orbit orbit-2"></div>

  <!-- Stars -->
  <script>
    const stars = [
      [5,8,2,0.3], [12,45,1,0.5], [20,15,1.5,0.4], [25,70,1,0.6],
      [35,25,2,0.3], [40,55,1,0.5], [45,80,1.5,0.4], [50,10,1,0.6],
      [55,40,2,0.3], [60,65,1,0.5], [65,20,1.5,0.4], [70,50,1,0.6],
      [75,75,2,0.3], [80,30,1,0.5], [85,60,1.5,0.4], [90,15,1,0.6],
      [95,45,2,0.3], [8,35,1,0.5], [15,55,1.5,0.4], [30,40,1,0.6],
      [42,20,1.5,0.3], [58,35,1,0.5], [72,60,2,0.4], [88,25,1,0.6],
      [3,20,1.5,0.4], [18,65,1,0.5], [33,50,2,0.3], [48,85,1,0.6],
      [63,10,1.5,0.4], [78,45,1,0.5], [93,70,2,0.3], [7,50,1,0.6],
    ];
    document.body.insertAdjacentHTML('beforeend',
      stars.map((s,i) =>
        `<div class="star" style="left:${s[0]}%;top:${s[1]}%;width:${s[2]}px;height:${s[2]}px;animation-delay:${s[3]}s;animation-duration:${3+s[2]}s;"></div>`
      ).join('')
    );
  </script>

  <!-- Content -->
  <div class="content">
    <div class="left">
      <div class="tagline">Full-Stack Developer &amp; Entrepreneur</div>
      <div class="name">
        <span class="first">Bagus Wiranto</span><br>
        <span class="gradient">Wicaksono</span>
      </div>
      <div class="role">Building AI-powered platforms with Next.js, FastAPI &amp; Docker</div>
    </div>
    <div class="right">
      <div class="project-badge orange">
        <div class="dot"></div>
        <div class="info">
          <div class="label">Founded</div>
          <div class="title">8Agents</div>
        </div>
      </div>
      <div class="project-badge pink">
        <div class="dot"></div>
        <div class="info">
          <div class="label">Founded</div>
          <div class="title">RakuSaku</div>
        </div>
      </div>
    </div>
  </div>

  <div class="deco-line"></div>
</body>
</html>
